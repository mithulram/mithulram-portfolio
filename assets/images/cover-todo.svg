<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a4a"/>
      <stop offset="100%" style="stop-color:#162040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Phone mockup -->
  <g transform="translate(270, 20)">
    <!-- Phone body -->
    <rect width="260" height="410" rx="28" fill="#1a1a2e" stroke="#ffffff15" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="8" y="32" width="244" height="368" rx="20" fill="#0d1117"/>
    <!-- Notch -->
    <rect x="90" y="32" width="80" height="20" rx="10" fill="#1a1a2e"/>
    <!-- Home bar -->
    <rect x="100" y="395" width="60" height="4" rx="2" fill="#ffffff25"/>

    <!-- App header -->
    <rect x="8" y="32" width="244" height="60" rx="20" fill="#e94560"/>
    <rect x="8" y="72" width="244" height="20" fill="#e94560"/>
    <text x="130" y="58" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">My Tasks</text>
    <text x="130" y="76" font-family="Arial, sans-serif" font-size="10" fill="#ffffff90" text-anchor="middle">3 remaining · 5 completed</text>

    <!-- Task items -->
    <!-- Task 1 - completed -->
    <rect x="18" y="105" width="224" height="46" rx="10" fill="#1e2a4a"/>
    <circle cx="38" cy="128" r="10" fill="#e94560"/>
    <line x1="32" y1="128" x2="38" y2="134" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="134" x2="48" y2="122" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="56" y="124" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60" text-decoration="line-through">Buy groceries</text>
    <text x="56" y="138" font-family="Arial, sans-serif" font-size="9" fill="#ffffff30">Due yesterday</text>

    <!-- Task 2 - completed -->
    <rect x="18" y="158" width="224" height="46" rx="10" fill="#1e2a4a"/>
    <circle cx="38" cy="181" r="10" fill="#e94560"/>
    <line x1="32" y1="181" x2="38" y2="187" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="187" x2="48" y2="175" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="56" y="177" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60" text-decoration="line-through">Morning workout</text>
    <text x="56" y="191" font-family="Arial, sans-serif" font-size="9" fill="#ffffff30">Completed today</text>

    <!-- Task 3 - pending (highlighted) -->
    <rect x="18" y="211" width="224" height="46" rx="10" fill="#e94560" opacity="0.15"/>
    <rect x="18" y="211" width="3" height="46" rx="1" fill="#e94560"/>
    <circle cx="38" cy="234" r="10" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="56" y="230" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Submit assignment</text>
    <text x="56" y="244" font-family="Arial, sans-serif" font-size="9" fill="#e9456090">Due today · High priority</text>

    <!-- Task 4 - pending -->
    <rect x="18" y="264" width="224" height="46" rx="10" fill="#1e2a4a"/>
    <circle cx="38" cy="287" r="10" fill="none" stroke="#ffffff40" stroke-width="2"/>
    <text x="56" y="283" font-family="Arial, sans-serif" font-size="11" fill="#ffffffc0">Read Flutter docs</text>
    <text x="56" y="297" font-family="Arial, sans-serif" font-size="9" fill="#ffffff40">Due tomorrow</text>

    <!-- Task 5 - pending -->
    <rect x="18" y="317" width="224" height="46" rx="10" fill="#1e2a4a"/>
    <circle cx="38" cy="340" r="10" fill="none" stroke="#ffffff40" stroke-width="2"/>
    <text x="56" y="336" font-family="Arial, sans-serif" font-size="11" fill="#ffffffc0">Code review</text>
    <text x="56" y="350" font-family="Arial, sans-serif" font-size="9" fill="#ffffff40">No due date</text>

    <!-- Add button -->
    <circle cx="220" cy="376" r="18" fill="#e94560"/>
    <text x="220" y="382" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">+</text>
  </g>

  <!-- Left side text -->
  <text x="40" y="150" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e94560" letter-spacing="4">FLUTTER</text>
  <text x="35" y="200" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">To-Do List</text>
  <text x="35" y="240" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">App</text>
  <line x1="35" y1="258" x2="175" y2="258" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <text x="35" y="288" font-family="Arial, sans-serif" font-size="12" fill="#ffffff80">BLoC Pattern</text>
  <text x="35" y="306" font-family="Arial, sans-serif" font-size="12" fill="#ffffff80">Clean Architecture</text>

  <!-- Badges -->
  <rect x="35" y="330" width="90" height="22" rx="11" fill="#e9456025" stroke="#e9456060" stroke-width="1"/>
  <text x="80" y="345" font-family="Arial, sans-serif" font-size="10" fill="#e94560" text-anchor="middle">Task Management</text>
  <rect x="35" y="358" width="80" height="22" rx="11" fill="#e9456025" stroke="#e9456060" stroke-width="1"/>
  <text x="75" y="373" font-family="Arial, sans-serif" font-size="10" fill="#e94560" text-anchor="middle">Local Storage</text>
</svg>
