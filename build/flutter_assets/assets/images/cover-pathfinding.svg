<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid area (right side) -->
  <g transform="translate(280, 30)">
    <!-- Grid background -->
    <rect width="480" height="390" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

    <!-- Visited cells (blue/teal) - spread across middle region -->
    <rect x="40" y="40" width="35" height="35" rx="3" fill="#1e3a5f" opacity="0.8"/>
    <rect x="80" y="40" width="35" height="35" rx="3" fill="#1e3a5f" opacity="0.8"/>
    <rect x="120" y="40" width="35" height="35" rx="3" fill="#1e3a5f" opacity="0.8"/>
    <rect x="160" y="40" width="35" height="35" rx="3" fill="#1e3a5f" opacity="0.8"/>
    <rect x="40" y="80" width="35" height="35" rx="3" fill="#1e4a6f" opacity="0.8"/>
    <rect x="80" y="80" width="35" height="35" rx="3" fill="#1e4a6f" opacity="0.8"/>
    <rect x="120" y="80" width="35" height="35" rx="3" fill="#1e4a6f" opacity="0.8"/>
    <rect x="160" y="80" width="35" height="35" rx="3" fill="#1e4a6f" opacity="0.8"/>
    <rect x="200" y="80" width="35" height="35" rx="3" fill="#1e4a6f" opacity="0.8"/>
    <rect x="40" y="120" width="35" height="35" rx="3" fill="#1e5a7f" opacity="0.8"/>
    <rect x="80" y="120" width="35" height="35" rx="3" fill="#1e5a7f" opacity="0.8"/>
    <rect x="120" y="120" width="35" height="35" rx="3" fill="#1e5a7f" opacity="0.8"/>
    <rect x="200" y="120" width="35" height="35" rx="3" fill="#1e5a7f" opacity="0.8"/>
    <rect x="240" y="120" width="35" height="35" rx="3" fill="#1e5a7f" opacity="0.8"/>
    <rect x="40" y="160" width="35" height="35" rx="3" fill="#1e6a8f" opacity="0.8"/>
    <rect x="80" y="160" width="35" height="35" rx="3" fill="#1e6a8f" opacity="0.8"/>
    <rect x="240" y="160" width="35" height="35" rx="3" fill="#1e6a8f" opacity="0.8"/>
    <rect x="280" y="160" width="35" height="35" rx="3" fill="#1e6a8f" opacity="0.8"/>
    <rect x="320" y="160" width="35" height="35" rx="3" fill="#1e6a8f" opacity="0.8"/>
    <rect x="80" y="200" width="35" height="35" rx="3" fill="#1e7a9f" opacity="0.8"/>
    <rect x="280" y="200" width="35" height="35" rx="3" fill="#1e7a9f" opacity="0.8"/>
    <rect x="320" y="200" width="35" height="35" rx="3" fill="#1e7a9f" opacity="0.8"/>
    <rect x="360" y="200" width="35" height="35" rx="3" fill="#1e7a9f" opacity="0.8"/>
    <rect x="320" y="240" width="35" height="35" rx="3" fill="#1e8aaf" opacity="0.8"/>
    <rect x="360" y="240" width="35" height="35" rx="3" fill="#1e8aaf" opacity="0.8"/>
    <rect x="400" y="240" width="35" height="35" rx="3" fill="#1e8aaf" opacity="0.8"/>

    <!-- Walls/obstacles (dark gray) -->
    <rect x="160" y="120" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="160" y="160" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="160" y="200" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="120" y="200" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="200" y="160" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="200" y="200" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="200" y="240" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="240" y="240" width="35" height="35" rx="3" fill="#30363d"/>
    <rect x="240" y="280" width="35" height="35" rx="3" fill="#30363d"/>

    <!-- Optimal path (yellow/gold with glow) -->
    <rect x="80" y="240" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="80" y="280" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="80" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="120" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="160" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="200" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="280" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="320" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="360" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="400" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="240" y="320" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>
    <rect x="400" y="280" width="35" height="35" rx="3" fill="#FFDB70" opacity="0.9"/>

    <!-- Start cell (green) -->
    <rect x="40" y="40" width="35" height="35" rx="3" fill="#22c55e"/>
    <text x="57" y="62" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">S</text>

    <!-- End cell (red) -->
    <rect x="400" y="280" width="35" height="35" rx="3" fill="#ef4444"/>
    <text x="417" y="302" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">E</text>

    <!-- Grid lines -->
    <line x1="40" y1="0" x2="40" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="280" y1="0" x2="280" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="390" stroke="#21262d" stroke-width="0.5"/>
    <line x1="440" y1="0" x2="440" y2="390" stroke="#21262d" stroke-width="0.5"/>

    <line x1="0" y1="40" x2="480" y2="40" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="480" y2="80" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="480" y2="120" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="480" y2="160" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="480" y2="200" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="480" y2="240" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="480" y2="280" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="480" y2="320" stroke="#21262d" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="480" y2="360" stroke="#21262d" stroke-width="0.5"/>
  </g>

  <!-- Left side panel -->
  <rect x="0" y="0" width="280" height="450" fill="#0d1117" opacity="0.6"/>

  <!-- Left side text -->
  <text x="40" y="150" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#22c55e" letter-spacing="4">PYTHON</text>
  <text x="35" y="200" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">Pathfinding</text>
  <text x="35" y="240" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">Visualizer</text>
  <line x1="35" y1="258" x2="185" y2="258" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <text x="35" y="288" font-family="Arial, sans-serif" font-size="13" fill="#ffffff80">A* Algorithm</text>
  <text x="35" y="308" font-family="Arial, sans-serif" font-size="13" fill="#ffffff80">Visualization</text>

  <!-- Legend -->
  <rect x="35" y="340" width="14" height="14" rx="2" fill="#22c55e"/>
  <text x="56" y="352" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60">Start</text>
  <rect x="35" y="362" width="14" height="14" rx="2" fill="#ef4444"/>
  <text x="56" y="374" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60">End</text>
  <rect x="100" y="340" width="14" height="14" rx="2" fill="#1e6a8f"/>
  <text x="121" y="352" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60">Visited</text>
  <rect x="100" y="362" width="14" height="14" rx="2" fill="#FFDB70"/>
  <text x="121" y="374" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60">Path</text>
</svg>
