<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8F135"/>
      <stop offset="100%" style="stop-color:#a8d420"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Phone mockup -->
  <g transform="translate(275, 18)">
    <!-- Phone body -->
    <rect width="255" height="414" rx="28" fill="#1c1c1c" stroke="#333333" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="8" y="32" width="239" height="370" rx="20" fill="#111111"/>
    <!-- Notch -->
    <rect x="88" y="32" width="79" height="20" rx="10" fill="#1c1c1c"/>
    <!-- Home bar -->
    <rect x="98" y="398" width="59" height="4" rx="2" fill="#ffffff20"/>

    <!-- App header -->
    <rect x="8" y="32" width="239" height="65" rx="20" fill="#111111"/>
    <rect x="8" y="72" width="239" height="25" fill="#111111"/>
    <!-- Logo text -->
    <rect x="20" y="44" width="90" height="28" rx="6" fill="#C8F135"/>
    <text x="65" y="63" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#000000" text-anchor="middle">coverme</text>
    <!-- Notification bell -->
    <rect x="207" y="46" width="28" height="24" rx="6" fill="#222222"/>
    <text x="221" y="63" font-family="Arial, sans-serif" font-size="14" fill="#C8F135" text-anchor="middle">🔔</text>

    <!-- Quick stats row -->
    <rect x="18" y="102" width="100" height="52" rx="10" fill="#1e1e1e"/>
    <text x="68" y="122" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#C8F135" text-anchor="middle">21s</text>
    <text x="68" y="138" font-family="Arial, sans-serif" font-size="8" fill="#ffffff60" text-anchor="middle">avg match time</text>

    <rect x="126" y="102" width="100" height="52" rx="10" fill="#1e1e1e"/>
    <text x="176" y="122" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#C8F135" text-anchor="middle">98%</text>
    <text x="176" y="138" font-family="Arial, sans-serif" font-size="8" fill="#ffffff60" text-anchor="middle">fill rate</text>

    <!-- Section title -->
    <text x="18" y="174" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Open Cover Requests</text>

    <!-- Cover request card 1 (active) -->
    <rect x="18" y="182" width="208" height="64" rx="10" fill="#1e1e1e"/>
    <rect x="18" y="182" width="4" height="64" rx="2" fill="#C8F135"/>
    <text x="30" y="198" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Yoga Flow — 8:00 AM</text>
    <text x="30" y="212" font-family="Arial, sans-serif" font-size="9" fill="#ffffff60">FitLife Studio · Today</text>
    <rect x="152" y="194" width="64" height="22" rx="11" fill="#C8F135"/>
    <text x="184" y="209" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#000000" text-anchor="middle">ACCEPT</text>
    <text x="30" y="236" font-family="Arial, sans-serif" font-size="8" fill="#C8F13580">Barre · Yoga · Pilates</text>

    <!-- Cover request card 2 -->
    <rect x="18" y="253" width="208" height="60" rx="10" fill="#1e1e1e"/>
    <rect x="18" y="253" width="4" height="60" rx="2" fill="#444444"/>
    <text x="30" y="269" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">Spin Class — 6:30 PM</text>
    <text x="30" y="283" font-family="Arial, sans-serif" font-size="9" fill="#ffffff60">PureGym · Tomorrow</text>
    <rect x="152" y="265" width="64" height="22" rx="11" fill="#222222" stroke="#444444" stroke-width="1"/>
    <text x="184" y="280" font-family="Arial, sans-serif" font-size="9" fill="#ffffff80" text-anchor="middle">VIEW</text>
    <text x="30" y="302" font-family="Arial, sans-serif" font-size="8" fill="#ffffff40">Cycling · HIIT</text>

    <!-- Earnings card -->
    <rect x="18" y="322" width="208" height="56" rx="10" fill="#C8F13515"/>
    <rect x="18" y="322" width="208" height="56" rx="10" fill="none" stroke="#C8F13540" stroke-width="1"/>
    <text x="30" y="340" font-family="Arial, sans-serif" font-size="9" fill="#C8F135">This month's earnings</text>
    <text x="30" y="360" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#C8F135">£ 1,240</text>
    <text x="185" y="355" font-family="Arial, sans-serif" font-size="9" fill="#C8F13590">+18% ↑</text>

    <!-- Bottom nav -->
    <rect x="8" y="380" width="239" height="22" rx="8" fill="#1c1c1c"/>
    <text x="45" y="395" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">🏠</text>
    <text x="90" y="395" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">🔍</text>
    <text x="135" y="395" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">📋</text>
    <text x="180" y="395" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">👤</text>
    <line x1="38" y1="380" x2="52" y2="380" stroke="#C8F135" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Left side text -->
  <text x="40" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C8F135" letter-spacing="4">FLUTTER</text>
  <text x="35" y="192" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#ffffff">CoverMe</text>
  <line x1="35" y1="210" x2="195" y2="210" stroke="#C8F135" stroke-width="3" stroke-linecap="round"/>
  <text x="35" y="238" font-family="Arial, sans-serif" font-size="13" fill="#ffffff80">Fitness Workforce</text>
  <text x="35" y="256" font-family="Arial, sans-serif" font-size="13" fill="#ffffff80">Management Platform</text>

  <!-- Store badges -->
  <rect x="35" y="280" width="110" height="28" rx="14" fill="#C8F13520" stroke="#C8F13550" stroke-width="1"/>
  <text x="90" y="298" font-family="Arial, sans-serif" font-size="10" fill="#C8F135" text-anchor="middle"> App Store</text>

  <rect x="35" y="316" width="118" height="28" rx="14" fill="#C8F13520" stroke="#C8F13550" stroke-width="1"/>
  <text x="94" y="334" font-family="Arial, sans-serif" font-size="10" fill="#C8F135" text-anchor="middle"> Play Store</text>

  <!-- Stat -->
  <text x="35" y="385" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#C8F135">21s</text>
  <text x="35" y="403" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60">to find &amp; book</text>
  <text x="35" y="418" font-family="Arial, sans-serif" font-size="11" fill="#ffffff60">an instructor</text>
</svg>
