<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <rect width="800" height="450" fill="none" stroke="#ffffff08" stroke-width="1"/>

  <!-- Sudoku Grid - centered -->
  <g transform="translate(220, 50)">
    <!-- Grid background -->
    <rect width="360" height="360" rx="8" fill="#1a2a3a" stroke="#FFDB7040" stroke-width="1.5"/>

    <!-- Inner cells background -->
    <!-- Row highlights for "solved" cells -->
    <rect x="2" y="2" width="116" height="116" rx="4" fill="#FFDB7010"/>
    <rect x="242" y="122" width="116" height="116" rx="4" fill="#FFDB7010"/>
    <rect x="122" y="242" width="116" height="116" rx="4" fill="#FFDB7010"/>

    <!-- Grid lines - thin -->
    <line x1="40" y1="0" x2="40" y2="360" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="80" y1="0" x2="80" y2="360" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="120" y1="0" x2="120" y2="360" stroke="#FFDB7060" stroke-width="2"/>
    <line x1="160" y1="0" x2="160" y2="360" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="200" y1="0" x2="200" y2="360" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="240" y1="0" x2="240" y2="360" stroke="#FFDB7060" stroke-width="2"/>
    <line x1="280" y1="0" x2="280" y2="360" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="320" y1="0" x2="320" y2="360" stroke="#ffffff15" stroke-width="0.8"/>

    <line x1="0" y1="40" x2="360" y2="40" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="0" y1="80" x2="360" y2="80" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="0" y1="120" x2="360" y2="120" stroke="#FFDB7060" stroke-width="2"/>
    <line x1="0" y1="160" x2="360" y2="160" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="0" y1="200" x2="360" y2="200" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="0" y1="240" x2="360" y2="240" stroke="#FFDB7060" stroke-width="2"/>
    <line x1="0" y1="280" x2="360" y2="280" stroke="#ffffff15" stroke-width="0.8"/>
    <line x1="0" y1="320" x2="360" y2="320" stroke="#ffffff15" stroke-width="0.8"/>

    <!-- Numbers - pre-filled (white) -->
    <text x="20" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">5</text>
    <text x="60" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">3</text>
    <text x="180" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">7</text>
    <text x="20" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">6</text>
    <text x="140" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">1</text>
    <text x="180" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">9</text>
    <text x="220" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">5</text>
    <text x="100" y="110" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">9</text>
    <text x="260" y="110" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">6</text>
    <text x="340" y="110" font-family="monospace" font-size="22" font-weight="bold" fill="#ffffff90" text-anchor="middle">3</text>

    <!-- Numbers - solved (yellow/gold) -->
    <text x="100" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">4</text>
    <text x="140" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">8</text>
    <text x="260" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">2</text>
    <text x="300" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">6</text>
    <text x="340" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">1</text>
    <text x="60" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">7</text>
    <text x="100" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">8</text>
    <text x="260" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">4</text>
    <text x="300" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">2</text>
    <text x="340" y="70" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">3</text>
    <text x="20" y="110" font-family="monospace" font-size="22" font-weight="bold" fill="#FFDB70" text-anchor="middle">8</text>

    <!-- Outer border -->
    <rect width="360" height="360" rx="8" fill="none" stroke="#FFDB70" stroke-width="2.5"/>
  </g>

  <!-- Left side text -->
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFDB70" letter-spacing="4">PYTHON</text>
  <text x="55" y="210" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Sudoku</text>
  <text x="55" y="255" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Solver</text>
  <line x1="55" y1="275" x2="175" y2="275" stroke="#FFDB70" stroke-width="3" stroke-linecap="round"/>
  <text x="55" y="305" font-family="Arial, sans-serif" font-size="13" fill="#ffffff80">Backtracking</text>
  <text x="55" y="325" font-family="Arial, sans-serif" font-size="13" fill="#ffffff80">Algorithm</text>

  <!-- Python icon hint -->
  <circle cx="80" cy="380" r="20" fill="#FFDB7020" stroke="#FFDB7060" stroke-width="1.5"/>
  <text x="80" y="387" font-family="Arial, sans-serif" font-size="18" fill="#FFDB70" text-anchor="middle">🐍</text>
</svg>
